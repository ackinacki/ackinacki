- name: Compose stop
  ansible.builtin.shell:
    chdir: "{{ BM_DIR }}"
    cmd: docker compose stop

- name: Compose stop (hard)
  ansible.builtin.shell:
    chdir: "{{ BM_DIR }}"
    cmd: docker compose kill

- name: Remove schema file
  ansible.builtin.file:
    path: "{{ BM_DATA_DIR }}/workdir/bm-schema.db"
    state: absent
  when: UPGRADE is defined and 'block-manager' in UPGRADE
